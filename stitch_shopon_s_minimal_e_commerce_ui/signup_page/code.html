<body class="bg-[#F5EDD7] text-on-surface min-h-screen flex flex-col font-body-md">
<!-- Suppressed Nav Shell per instructions for transactional/login/signup screens -->
<main class="flex-grow flex items-center justify-center p-gutter">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-xl shadow-[0px_10px_30px_rgba(27,42,74,0.05)] border border-primary-container/20">
<div class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg text-primary tracking-[0.2em] uppercase mb-sm">SHOPON</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Create an account to continue</p>
</div>
<!-- Role Selector -->
<div class="flex gap-md mb-lg">
<button class="flex-1 py-md px-sm rounded-lg border-2 border-primary bg-primary text-on-primary font-button text-button relative overflow-hidden transition-colors flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined text-tertiary-container" style="font-variation-settings: 'FILL' 1;">person</span>
                    Customer
                    <!-- Active Indicator (Gold Accent) -->
<div class="absolute bottom-0 left-0 w-full h-1 bg-tertiary-container"></div>
</button>
<button class="flex-1 py-md px-sm rounded-lg border border-primary-container/20 bg-surface-bright text-on-surface-variant font-button text-button hover:bg-surface-container-low transition-colors flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined">storefront</span>
                    Vendor
                </button>
</div>
<form class="space-y-md">
<div class="flex gap-md">
<div class="flex-1">
<label class="block font-label-md text-label-md text-on-surface uppercase mb-sm" for="firstName">First Name</label>
<input class="w-full h-[48px] rounded-lg border border-primary-container/20 bg-surface-container-lowest px-md font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="firstName" placeholder="Jane" type="text"/>
</div>
<div class="flex-1">
<label class="block font-label-md text-label-md text-on-surface uppercase mb-sm" for="lastName">Last Name</label>
<input class="w-full h-[48px] rounded-lg border border-primary-container/20 bg-surface-container-lowest px-md font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="lastName" placeholder="Doe" type="text"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface uppercase mb-sm" for="email">Email Address</label>
<input class="w-full h-[48px] rounded-lg border border-primary-container/20 bg-surface-container-lowest px-md font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" placeholder="jane@example.com" type="email"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface uppercase mb-sm" for="password">Password</label>
<div class="relative">
<input class="w-full h-[48px] rounded-lg border border-primary-container/20 bg-surface-container-lowest pl-md pr-[48px] font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-0 h-full w-[48px] flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<div class="pt-sm">
<button class="w-full h-[48px] rounded-lg bg-primary text-on-primary font-button text-button hover:opacity-90 transition-opacity" type="submit">
                        Create Account
                    </button>
</div>
</form>
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4" href="#">Log in</a>
</p>
</div>
</div>
