<body class="min-h-screen flex flex-col antialiased">
<!-- Top Navigation / Logo Area (Simplified for Login as per instructions) -->
<header class="w-full flex justify-center items-center py-xl bg-transparent z-40 relative">
<!-- Logo -->
<h1 class="font-display-lg text-display-lg text-navy tracking-[0.2em] uppercase">SHOPON</h1>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center px-container-margin py-xl w-full max-w-7xl mx-auto">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-xl shadow-[0px_10px_30px_rgba(27,42,74,0.05)] relative overflow-hidden">

<div class="absolute top-0 right-0 w-32 h-32 bg-secondary-container opacity-20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
<div class="relative z-10">
<div class="mb-xl text-center">
<h2 class="font-headline-lg text-headline-lg text-navy mb-sm">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your curated collection.</p>
</div>
<form class="space-y-lg">
<!-- Email Input -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-navy uppercase" for="email">Email Address</label>
<input class="w-full h-12 px-md bg-surface-container-lowest border navy-border rounded-DEFAULT font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus-gold-underline transition-all duration-200" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-navy uppercase" for="password">Password</label>
<a class="font-body-sm text-body-sm text-gold hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-md bg-surface-container-lowest border navy-border rounded-DEFAULT font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus-gold-underline transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-on-surface-variant/50 hover:text-navy transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-12 mt-xl bg-navy text-[#F5EDD7] font-button text-button rounded-lg flex items-center justify-center hover:opacity-90 transition-opacity duration-150" type="submit">
                        Sign In
                    </button>
</form>

<div class="flex-grow border-t navy-border"></div>
<span class="px-sm font-body-sm text-body-sm text-on-surface-variant/60 uppercase tracking-widest">Or</span>
<div class="flex-grow border-t navy-border"></div>
</div>
<!-- Secondary Action -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">

                        <a class="text-navy font-semibold hover:text-gold transition-colors ml-1" href="#">Create one</a>
</p>
</div>
