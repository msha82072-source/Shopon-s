<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SHOPON - Order Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

        tailwind.config = {
            darkMode: "class",

                extend: {
                    "colors": {
                        "surface-bright": "#f9f9f9",

                        "on-error-container": "#93000a",
                        "surface-container": "#eeeeee",
                        "on-secondary-fixed-variant": "#4b4737",
                        "tertiary-container": "#c8a74c",
                        "primary-fixed-dim": "#b7c6ee",
                        "on-surface-variant": "#45464e",
                        "tertiary": "#755b00",
                        "tertiary-fixed-dim": "#e6c364",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#1f1c0e",
                        "outline": "#75777f",
                        "surface": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "surface-container-low": "#f3f3f4",
                        "primary-container": "#1b2a4a",
                        "primary": "#041534",
                        "secondary": "#635e4d",
                        "background": "#f9f9f9",
                        "on-primary-fixed-variant": "#384668",
                        "secondary-fixed-dim": "#cdc6b1",
                        "on-primary-fixed": "#0a1a3a",
                        "on-background": "#1a1c1c",
                        "on-primary-container": "#8392b7",
                        "tertiary-fixed": "#ffe08f",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "inverse-primary": "#b7c6ee",

                        "primary-fixed": "#d9e2ff",

                        "on-secondary-container": "#696453",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "sm": "8px",

                        "xs": "4px",

                        "xl": "48px"

                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "display-lg": ["Playfair Display"],
                        "headline-lg": ["Playfair Display"],
                        "button": ["Inter"],

                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-primary-container text-surface-bright min-h-screen flex flex-col items-center justify-center font-body-md antialiased selection:bg-tertiary-container selection:text-primary-container">
<main class="w-full max-w-md px-container-margin flex flex-col items-center justify-center text-center">
<!-- Animated Checkmark / Icon Container -->
<div class="mb-xl relative">
<div class="absolute inset-0 bg-tertiary-container opacity-20 rounded-full blur-xl scale-150"></div>
<div class="w-24 h-24 rounded-full border-2 border-tertiary-container flex items-center justify-center relative z-10 bg-primary-container">
<span class="material-symbols-outlined text-[48px] text-tertiary-container" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<!-- Success Message -->
<div class="space-y-sm mb-xl">
<h1 class="font-headline-lg text-headline-lg text-surface-bright tracking-wide">Order Placed!</h1>
<p class="font-body-lg text-body-lg text-inverse-primary/80">
                Your luxury curated items are being prepared.
            </p>
</div>
<!-- Order Details Snippet (Minimal) -->
<div class="w-full border-t border-b border-inverse-primary/20 py-lg mb-xl space-y-md">
<div class="flex justify-between items-center text-left">
<span class="font-body-md text-body-md text-inverse-primary/60">Order Number</span>
<span class="font-button text-button text-surface-bright uppercase tracking-wider">#SHP-8924</span>
</div>
<div class="flex justify-between items-center text-left">
<span class="font-body-md text-body-md text-inverse-primary/60">Confirmation sent to</span>
<span class="font-body-md text-body-md text-surface-bright">user@example.com</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-12 bg-surface-bright text-primary-container font-button text-button rounded-lg flex items-center justify-center hover:bg-surface-dim transition-colors duration-200">
            Back to Home
        </button>
<p class="mt-lg font-body-sm text-body-sm text-inverse-primary/40">
            Need help? <a class="text-tertiary-container hover:underline underline-offset-4" href="#">Contact Support</a>
</p>
</main>
</body></html>
