<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SHOPON - Checkout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

                        "surface": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "surface-container-low": "#f3f3f4",
                        "primary-container": "#1b2a4a",
                        "primary": "#041534",
                        "secondary": "#635e4d",

                        "on-primary-fixed-variant": "#384668",

                        "inverse-primary": "#b7c6ee",
                        "surface-container-high": "#e8e8e8",
                        "inverse-surface": "#2f3131",
                        "outline-variant": "#c5c6cf",
                        "on-surface": "#1a1c1c",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#d9e2ff",
                        "inverse-on-surface": "#f0f1f1",
                        "secondary-container": "#eae2cc",
                        "surface-tint": "#4f5e81",
                        "on-tertiary-fixed": "#241a00",
                        "on-tertiary-container": "#4f3d00",

                        "on-secondary-container": "#696453",
                        "surface-container-highest": "#e2e2e2",
                        "secondary-fixed": "#eae2cc",
                        "on-secondary": "#ffffff",
                        "custom-cream": "#F5EDD7",
                        "custom-navy": "#1B2A4A",
                        "custom-gold": "#C9A84C"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "gutter": "16px",
                        "container-margin": "20px",
                        "md": "16px",
                        "unit": "4px",

                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "button": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],

                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="bg-[#FDFBF7] text-[#1B2A4A] font-['Noto_Serif'] font-light tracking-widest uppercase docked full-width top-0 z-40 border-b border-[#1B2A4A]/20 flex justify-between items-center w-full px-6 py-4 max-w-full">
<button class="text-[#1B2A4A]/60 hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<div class="text-2xl font-bold tracking-[0.2em] text-[#1B2A4A]">SHOPON</div>
<button class="text-[#1B2A4A]/60 hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow max-w-7xl mx-auto w-full px-6 py-xl md:py-20 grid grid-cols-1 lg:grid-cols-12 gap-xl">
<!-- Header Section -->
<div class="col-span-1 lg:col-span-12 mb-lg">
<a class="inline-flex items-center text-custom-navy/60 hover:text-custom-navy transition-colors mb-md" href="#">
<span class="material-symbols-outlined mr-sm text-[20px]" data-icon="arrow_back">arrow_back</span>
<span class="font-button text-button uppercase">Back to Cart</span>
</a>
<h1 class="font-headline-lg text-headline-lg text-custom-navy">Checkout</h1>
</div>
<!-- Checkout Form (Left Column) -->
<div class="col-span-1 lg:col-span-7 space-y-xl">
<!-- Contact Information -->
<section>
<h2 class="font-headline-md text-headline-md text-custom-navy mb-lg">Contact Information</h2>
<div class="space-y-md">
<div>
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">Email Address</label>
<input class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors" placeholder="Enter your email" type="email"/>
</div>
<label class="flex items-center cursor-pointer">
<input class="form-checkbox h-5 w-5 text-custom-navy border-custom-navy/20 rounded focus:ring-custom-navy bg-surface-container-lowest" type="checkbox"/>
<span class="ml-sm font-body-sm text-body-sm text-custom-navy/80">Email me with news and offers</span>
</label>
</div>
</section>
<!-- Shipping Address -->
<section>
<h2 class="font-headline-md text-headline-md text-custom-navy mb-lg">Shipping Address</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">First Name</label>
<input class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">Last Name</label>
<input class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors" type="text"/>
</div>
<div class="md:col-span-2">
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">Address</label>
<input class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors" placeholder="Street address or P.O. Box" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">City</label>
<input class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">State / Province</label>
<select class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors appearance-none">
<option>Select State</option>
<option>California</option>
<option>New York</option>
<option>Texas</option>
</select>
</div>
<div>
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">ZIP / Postal Code</label>
<input class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">Country</label>
<select class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors appearance-none">
<option>United States</option>
<option>Canada</option>
<option>United Kingdom</option>
</select>
</div>
</div>
</section>
<!-- Payment -->
<section>
<h2 class="font-headline-md text-headline-md text-custom-navy mb-lg">Payment</h2>
<div class="bg-surface-container-lowest rounded-lg border border-custom-navy/20 p-lg space-y-md">
<div class="flex items-center justify-between pb-md border-b border-custom-navy/10">
<label class="flex items-center cursor-pointer">
<input checked="" class="form-radio h-5 w-5 text-custom-navy border-custom-navy/20 focus:ring-custom-navy bg-surface-container-lowest" name="payment_method" type="radio"/>
<span class="ml-sm font-button text-button text-custom-navy uppercase">Credit Card</span>
</label>
<div class="flex gap-sm">
<span class="material-symbols-outlined text-custom-navy/60" data-icon="credit_card">credit_card</span>
</div>
</div>
<div class="space-y-md pt-sm">
<div>
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">Card Number</label>
<input class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors" placeholder="0000 0000 0000 0000" type="text"/>
</div>
<div class="grid grid-cols-2 gap-md">
<div>
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">Expiration Date</label>
<input class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors" placeholder="MM/YY" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">Security Code</label>
<input class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors" placeholder="CVC" type="text"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-custom-navy mb-sm uppercase">Name on Card</label>
<input class="w-full bg-surface-container-lowest border border-custom-navy/20 rounded h-[48px] px-md font-body-md text-body-md text-custom-navy focus:outline-none focus:border-custom-navy focus:ring-1 focus:ring-custom-navy transition-colors" type="text"/>
</div>
</div>
</div>
</section>
</div>
<!-- Order Summary (Right Column) -->
<div class="col-span-1 lg:col-span-5 relative">
<div class="sticky top-[100px] bg-[#1B2A4A] text-[#F5EDD7] rounded-xl p-lg shadow-[0px_10px_30px_rgba(27,42,74,0.1)]">
<h3 class="font-headline-md text-headline-md mb-lg border-b border-[#F5EDD7]/20 pb-md">Order Summary</h3>
<!-- Items List -->
<div class="space-y-md mb-lg border-b border-[#F5EDD7]/20 pb-lg">
<!-- Item 1 -->
<div class="flex items-start gap-md">
<div class="w-20 h-24 bg-surface-container-lowest rounded overflow-hidden flex-shrink-0">
<img alt="Minimalist white ceramic vase with smooth curves" class="w-full h-full object-cover" data-alt="minimalist white ceramic vase sitting on a light wooden table against a clean beige background with soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCo-zOk8mif86zdulhukUNJ4tSGMchMaC4aVZKz5wDvnBSRBMG0GxjXSJC5mllr11MLBm3oCKU3aTvhkSbK4dVbgJzreNpN2Y2O_ZCcNxL1Nl4m1E6pDaIzEf7b2VInQcvCyNaql_4BG04ziKl2PD5IKvVIQkxs2c-z9Wwey7X71nvvmjbweT1PE-8ZH7taHMoJbgFN1ycCDdBMLQBniAOvktmlEJ6kBP_ABxXUtIq487aFLifToLxIf5g4IQiqBjLMW_o5FZ6xH7t0"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<div>
<h4 class="font-button text-button uppercase text-[#F5EDD7]">Ceramic Vase</h4>
<p class="font-body-sm text-body-sm text-[#F5EDD7]/70 mt-xs">Matte White</p>
</div>
<span class="font-button text-button">$45.00</span>
</div>
<div class="mt-sm font-body-sm text-body-sm text-[#F5EDD7]/50">Qty: 1</div>
</div>
</div>
<!-- Item 2 -->
<div class="flex items-start gap-md">
<div class="w-20 h-24 bg-surface-container-lowest rounded overflow-hidden flex-shrink-0">
<img alt="Linen throw blanket draped elegantly" class="w-full h-full object-cover" data-alt="folded cream colored linen throw blanket with frayed edges resting on a modern chair in soft window light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxVP5rimCnoRSeBZkBdT3CBNebM6nAhL9Torj8d7RDT57qR9PQRhFD0YpDgqjtVzFfhXNhTbX7Ux54Et510nOBTw13ROuEPdrCryhFQh2JXqfXMNR9iRTVz3wg6vssQlDOs5p9EXUobW0Ig2pQSyBVoSGL8KPPPedNrPIIBjBfWoz-X4n5FKXpZRhijmLq-fekPWj9J3PwTjZ0eT74Idy1Wv7eCHwAXyFYUaBBUMODvhmEBk2ioVr5TFdJPUjTK7IpTQEhHVkBcda0"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<div>
<h4 class="font-button text-button uppercase text-[#F5EDD7]">Linen Throw</h4>
<p class="font-body-sm text-body-sm text-[#F5EDD7]/70 mt-xs">Oatmeal</p>
</div>
<span class="font-button text-button">$85.00</span>
</div>
<div class="mt-sm font-body-sm text-body-sm text-[#F5EDD7]/50">Qty: 1</div>
</div>
</div>
</div>
<!-- Totals -->
<div class="space-y-sm mb-lg">
<div class="flex justify-between font-body-md text-body-md text-[#F5EDD7]/80">
<span>Subtotal</span>
<span>$130.00</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-[#F5EDD7]/80">
<span>Shipping</span>
<span>Calculated at next step</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-[#F5EDD7]/80">
<span>Taxes</span>
<span>$11.05</span>
</div>
<div class="flex justify-between font-headline-md text-headline-md pt-md border-t border-[#F5EDD7]/20 mt-md">
<span>Total</span>
<span>$141.05</span>
</div>
</div>
<!-- Action -->
<button class="w-full bg-[#C9A84C] text-[#1B2A4A] h-[48px] rounded-lg font-button text-button uppercase hover:opacity-90 transition-opacity flex items-center justify-center gap-sm">
                    Place Order
                    <span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</button>
<p class="text-center font-body-sm text-body-sm text-[#F5EDD7]/50 mt-sm">Secure Checkout</p>
</div>
</div>
</main>
<!-- Navigation Suppressed as per logic for Transactional pages -->
</body></html>
